<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a">
        <animate attributeName="stop-color" values="#0a0a0a;#1a0a2e;#0a0a0a" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#16213e">
        <animate attributeName="stop-color" values="#16213e;#0f3460;#16213e" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1a0a2e">
        <animate attributeName="stop-color" values="#1a0a2e;#16213e;#1a0a2e" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="orb1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.4">
        <animate attributeName="stop-opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#c8aa82" stop-opacity="0.3">
        <animate attributeName="stop-opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#c8aa82" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" rx="16"/>
  
  <!-- Animated orbs -->
  <circle cx="160" cy="70" r="80" fill="url(#orb1)">
    <animate attributeName="cx" values="160;200;160" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="70;110;70" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="150" r="90" fill="url(#orb2)">
    <animate attributeName="cx" values="640;600;640" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="150;110;150" dur="6s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Grid lines -->
  <g stroke="#e94560" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="40" x2="800" y2="40">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="110" x2="800" y2="110">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="180" x2="800" y2="180">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="5s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Main title -->
  <text x="50%" y="48%" dominant-baseline="middle" text-anchor="middle" font-family="Segoe UI, system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="#e94560" filter="url(#glow)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
    Bhargavi N.
  </text>
  
  <!-- Subtitle -->
  <text x="50%" y="72%" dominant-baseline="middle" text-anchor="middle" font-family="Segoe UI, system-ui, -apple-system, sans-serif" font-size="20" fill="#c8aa82">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    Risk &amp; Fraud Analyst | Financial Crime Prevention Specialist
  </text>
  
  <!-- Animated particles -->
  <g fill="#e94560" opacity="0.6">
    <circle r="2">
      <animate attributeName="cx" values="100;700;100" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;20;200" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.5">
      <animate attributeName="cx" values="700;100;700" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="30;190;30" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5">
      <animate attributeName="cx" values="300;500;300" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="180;40;180" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle r="1">
      <animate attributeName="cx" values="500;200;500" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="50;170;50" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Bottom glow line -->
  <rect x="150" y="198" width="500" height="2" rx="1" fill="#e94560" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="width" values="500;550;500" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="150;125;150" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>