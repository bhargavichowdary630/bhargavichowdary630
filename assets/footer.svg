<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" width="100%">
  <defs>
    <linearGradient id="fgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.8">
        <animate attributeName="stop-color" values="#e94560;#c8aa82;#e94560" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#c8aa82" stop-opacity="0.8">
        <animate attributeName="stop-color" values="#c8aa82;#06B6D4;#c8aa82" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.8">
        <animate attributeName="stop-color" values="#06B6D4;#e94560;#06B6D4" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#fgrad)" rx="12" opacity="0.12"/>
  <text x="50%" y="40%" dominant-baseline="middle" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600" fill="#dadada">
    "Let's build fraud-free financial systems together."
  </text>
  <text x="50%" y="68%" dominant-baseline="middle" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#c8aa82">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    © 2026 Bhargavi Nimmagadda | All Rights Reserved
  </text>
</svg>